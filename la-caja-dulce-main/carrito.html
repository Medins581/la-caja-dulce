<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito | La Caja Dulce</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="img/logotab.ico">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="site-header capsule-header">
    <div class="header-container">
        <div class="header-left">
            <button class="mobile-menu-btn" id="menuBtn" aria-label="Abrir menú">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <nav class="nav-links desktop-only">
                <a href="productos.html" class="boton-nav">PRODUCTOS</a>
                <a href="SobreNosotros.html" class="boton-nav">SOBRE NOSOTROS</a>
            </nav>
        </div>

        <div class="header-center">
            <a href="index.html" class="logo-link">
                <div class="logo-box">
                    <img src="img/LOGOSIN.png" alt="La Caja Dulce" class="main-logo">
                </div>
            </a>
        </div>

        <div class="header-right">
            <div class="header-icons">
                <a href="index.html" class="icon-link">
                    <img src="img/home.png" alt="Inicio" class="icono">
                </a>
                <a href="carrito.html" class="icon-link">
                    <img src="img/shopping-cart1.png" alt="Carrito" class="icono">
                </a>
                <a href="#" class="icon-link">
                    <img src="img/lupita.png" alt="Buscar" class="icono">
                </a>
            </div>
        </div>
    </div>

    <div class="menu-overlay" id="menuOverlay"></div>

    <!-- Mobile Navigation Menu -->
    <div class="mobile-nav" id="mobileNav">
        <button class="close-menu-btn" id="closeMenuBtn" aria-label="Cerrar menú">&times;</button>
        <div class="mobile-nav-header">
            <div class="logo-circle-small">
                <img src="img/LOGOSIN.png" alt="Logo">
            </div>
        </div>
        <nav class="mobile-links">
            <a href="index.html">INICIO</a>
            <a href="productos.html">PRODUCTOS</a>
            <a href="SobreNosotros.html">SOBRE NOSOTROS</a>
            <a href="club-del-pan.html">EL CLUB DEL PAN</a>
            <a href="carrito.html">MI CARRITO</a>
        </nav>
        <div class="mobile-nav-footer">
            <p>La Caja Dulce</p>
            <div class="mobile-socials">
                <!-- Placeholder for social icons if needed -->
            </div>
        </div>
    </div>
</header>

<div class="cuerpo-carrito">
    <section class="seccion-formulario">
        <form class="form-checkout" onsubmit="procesarPedido(event)">
            
            <h3>CONTACTO</h3>
            <input type="tel" id="telefono" placeholder="TELÉFONO" class="input-gris" required>
            
            <h3>INFORMACIÓN DE ENVÍO</h3>
            <select id="pais" class="input-gris">
                <option value="España">ESPAÑA</option>
            </select>
            
            <div class="fila-doble">
                <input type="text" id="nombre" placeholder="NOMBRE" required>
                <input type="text" id="apellido" placeholder="APELLIDO" required>
            </div>
            
            <input type="text" id="direccion" placeholder="DIRECCIÓN" class="input-gris" required>
            <input type="text" id="apartamento" placeholder="APARTAMENTO, CASA, EDIFICIO" class="input-gris">
            
            <div class="fila-doble">
                <input type="text" id="ciudad" placeholder="CIUDAD" required>
                <input type="text" id="cp" placeholder="CÓDIGO POSTAL" required>
            </div>
            
            <input type="email" id="email" placeholder="CORREO ELECTRÓNICO" class="input-gris" required>

            <button type="submit" class="btn-finalizar-pago">FINALIZAR PEDIDO EN WHATSAPP</button>

        </form>
    </section>

    <aside class="seccion-resumen">
        <div class="contenido-resumen">
            
            <div id="contenedor-productos-carrito">
                </div>

            <div class="bloque-inferior-resumen">
                
                <div class="fila-cupon">
                    <input type="text" placeholder="CÓDIGO DE DESCUENTO O TARJETA REGALO" class="input-cupon">
                    <button class="btn-aplicar">APLICAR</button>
                </div>

                <div class="precios-finales">
                    <p id="texto-subtotal">SUB-TOTAL • 0,00€</p>
                    <p id="texto-envio">ENVÍO • GRATIS EN VILAFRANCA</p>
                    <h2 class="gran-total" id="texto-total">TOTAL • 0,00€</h2>
                </div>

            </div>
        </div>
    </aside>
</div>

<script>
// 1. DIBUJAR EL CARRITO AL CARGAR LA PÁGINA
window.onload = function actualizarCarrito() {
    // Leemos la memoria
    let carrito = JSON.parse(localStorage.getItem('carritoCajaDulce')) || [];
    let contenedor = document.getElementById('contenedor-productos-carrito');
    
    // Contenedores de precios
    let textoSubtotal = document.getElementById('texto-subtotal');
    let textoTotal = document.getElementById('texto-total');
    
    contenedor.innerHTML = ''; // Limpiamos la pantalla
    let total = 0;

    if (carrito.length === 0) {
        contenedor.innerHTML = '<p class="mensaje-carrito-vacio">TU CARRITO ESTÁ VACÍO.</p>';
        textoSubtotal.innerText = `SUB-TOTAL • 0,00€`;
        textoTotal.innerText = `TOTAL • 0,00€`;
        return; // Paramos aquí si está vacío
    }

    // Dibujamos cada producto que haya en la memoria
    carrito.forEach((item, index) => {
        let precioFila = item.precio * item.cantidad;
        total += precioFila;

        // Inyectamos el diseño html mejorado
        contenedor.innerHTML += `
            <div class="item-carrito" style="position: relative;">
                <div class="cuadro-foto">
                    ${item.url_imagen ? `<img src="${item.url_imagen}" alt="${item.nombre}">` : ''}
                </div> 
                <div class="info-producto">
                    <p class="nombre-producto">${item.cantidad}x ${item.nombre}</p>
                    <span class="precio-producto">${precioFila.toFixed(2)}€</span>
                    <span class="btn-quitar-item" onclick="borrarProducto(${index})">Quitar</span>
                </div>
            </div>
        `;
    });

    // Actualizamos los textos de los precios totales
    textoSubtotal.innerText = `SUB-TOTAL • ${total.toFixed(2)}€`;
    textoTotal.innerText = `TOTAL • ${total.toFixed(2)}€`;
}

// 2. FUNCIÓN PARA BORRAR UN PRODUCTO (La llama el botoncito "Quitar")
function borrarProducto(index) {
    let carrito = JSON.parse(localStorage.getItem('carritoCajaDulce')) || [];
    carrito.splice(index, 1);
    localStorage.setItem('carritoCajaDulce', JSON.stringify(carrito));
    window.onload(); // Recargamos el carrito
}

// 3. ENVIAR TODO A WHATSAPP
function procesarPedido(event) {
    event.preventDefault();

    try {
        let carrito = JSON.parse(localStorage.getItem('carritoCajaDulce')) || [];
        
        if (carrito.length === 0) {
            alert("Tu carrito está vacío. ¡Añade algún pan primero antes de finalizar el pedido!");
            return;
        }

        // Recoger datos del cliente
        const nombre = document.getElementById('nombre').value;
        const apellido = document.getElementById('apellido').value;
        const telefono = document.getElementById('telefono').value;
        const direccion = document.getElementById('direccion').value;
        const ciudad = document.getElementById('ciudad').value;
        const apartamento = document.getElementById('apartamento').value;
        
        // Recoger productos directamente de la memoria (¡Es más seguro que leer la pantalla!)
        let productosTexto = "";
        let totalFinal = 0;
        
        carrito.forEach((item) => {
            let precioFila = item.precio * item.cantidad;
            productosTexto += `• ${item.cantidad}x ${item.nombre} - ${precioFila.toFixed(2)}€\n`;
            totalFinal += precioFila;
        });

        const idPedido = Math.floor(Math.random() * 9000) + 1000;

        // CREAR EL MENSAJE
        let mensaje = `👋 *HOLA! NUEVO PEDIDO #${idPedido}*\n`;
        mensaje += `--------------------------------\n`;
        mensaje += `👤 *Cliente:* ${nombre} ${apellido}\n`;
        mensaje += `📞 *Tel:* ${telefono}\n`;
        mensaje += `📍 *Dirección:* ${direccion}, ${apartamento}, ${ciudad}\n`;
        mensaje += `--------------------------------\n`;
        mensaje += `🥖 *PEDIDO:*\n${productosTexto}`;
        mensaje += `--------------------------------\n`;
        mensaje += `💰 *TOTAL: ${totalFinal.toFixed(2)}€*\n`;
        mensaje += `--------------------------------\n`;
        mensaje += `ℹ️ *Espero confirmación para pago y entrega.*`;

        // ABRIR WHATSAPP
        const miNumero = "34694261472"; // He mantenido el número que pusiste en tu código
        const url = `https://wa.me/${miNumero}?text=${encodeURIComponent(mensaje)}`;
        
        // Vaciamos el carrito porque ya ha hecho el pedido
        localStorage.removeItem('carritoCajaDulce');
        
        // Mandamos al cliente a WhatsApp
        window.location.href = url;

    } catch (error) {
        alert("Hubo un error al crear el pedido: " + error.message);
        console.error(error);
    }
}

// Menú móvil toggle
const menuBtn = document.getElementById('menuBtn');
const mobileNav = document.getElementById('mobileNav');
const menuOverlay = document.getElementById('menuOverlay');

function toggleMenu() {
    if (menuBtn) menuBtn.classList.toggle('active');
    if (mobileNav) mobileNav.classList.toggle('active');
    if (menuOverlay) menuOverlay.classList.toggle('active');
    document.body.classList.toggle('no-scroll');
}

if (menuBtn && mobileNav && menuOverlay) {
    menuBtn.addEventListener('click', toggleMenu);
    menuOverlay.addEventListener('click', toggleMenu);
    const closeMenuBtn = document.getElementById('closeMenuBtn');
    if (closeMenuBtn) closeMenuBtn.addEventListener('click', toggleMenu);
}

// Cerrar menú al volver a PC
window.addEventListener('resize', () => {
    if (window.innerWidth > 992 && mobileNav && mobileNav.classList.contains('active')) {
        toggleMenu();
    }
});
</script>
</body>
</html>
